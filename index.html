    <style>
      :root {
            --bg-deep: #080e14;
            --bg-card: #0f1a22;
            --bg-card-hover: #131f2a;
            --accent: #00e5a0;
            --accent-glow: rgba(0, 229, 160, 0.35);
            --accent2: #4db8ff;
            --accent2-glow: rgba(77, 184, 255, 0.3);
            --gold: #f0c060;
            --gold-glow: rgba(240, 192, 96, 0.3);
            --text: #e8edf2;
            --text-muted: #94a3b8;
            --text-soft: #bcc8d4;
            --border: rgba(255, 255, 255, 0.07);
            --border-accent: rgba(0, 229, 160, 0.2);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.55);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-heading: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --font-body: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        font-size: 16px;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body {
        font-family: var(--font-body);
        background: var(--bg-deep);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.7;
        overflow-x: hidden;
        position: relative;
        letter-spacing: 0.01em;
    }

    /* Subtle animated background */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
            radial-gradient(ellipse at 15% 10%, rgba(0, 229, 160, 0.04) 0%, transparent 55%),
            radial-gradient(ellipse at 85% 75%, rgba(77, 184, 255, 0.04) 0%, transparent 55%),
            radial-gradient(ellipse at 50% 50%, rgba(240, 192, 96, 0.02) 0%, transparent 70%);
    }

    /* Floating particles */
    .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }
    .particle {
        position: absolute;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        animation: floatUp 8s infinite ease-in;
    }
    .particle:nth-child(1) { width: 3px; height: 3px; left: 10%; animation-delay: 0s; animation-duration: 9s; }
    .particle:nth-child(2) { width: 2px; height: 2px; left: 25%; animation-delay: 1.5s; animation-duration: 7s; }
    .particle:nth-child(3) { width: 4px; height: 4px; left: 40%; animation-delay: 3s; animation-duration: 10s; }
    .particle:nth-child(4) { width: 2px; height: 2px; left: 55%; animation-delay: 0.8s; animation-duration: 8.5s; }
    .particle:nth-child(5) { width: 3px; height: 3px; left: 70%; animation-delay: 4s; animation-duration: 11s; }
    .particle:nth-child(6) { width: 2px; height: 2px; left: 85%; animation-delay: 2.2s; animation-duration: 7.5s; }
    .particle:nth-child(7) { width: 3px; height: 3px; left: 92%; animation-delay: 5s; animation-duration: 9.5s; }
    .particle:nth-child(8) { width: 2px; height: 2px; left: 18%; animation-delay: 6s; animation-duration: 8s; }
